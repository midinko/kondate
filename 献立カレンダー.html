<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>献立カレンダー</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg-secondary:#f6f5f3;--bg-tertiary:#f0ede8;
  --text-primary:#1a1917;--text-secondary:#6b6a67;--text-tertiary:#9e9d9a;
  --border:#e5e4e0;--border-hover:#c8c7c3;
  --accent:#534AB7;--accent-light:#EEEDFE;--accent-mid:#7F77DD;
  --radius-md:8px;--radius-lg:12px;
  --url-color:#0ea5e9;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1b1a;--bg-secondary:#262523;--bg-tertiary:#2e2c2b;
    --text-primary:#f0ede8;--text-secondary:#a8a7a4;--text-tertiary:#6b6a67;
    --border:#3a3937;--border-hover:#525150;--accent-light:#26215C;
    --url-color:#38bdf8;
  }
}
body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif;background:var(--bg-tertiary);color:var(--text-primary);min-height:100vh;padding:1.25rem 1rem}
.container{max-width:820px;margin:0 auto}
.app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.app-title{font-size:19px;font-weight:600;display:flex;align-items:center;gap:7px}
.tabs{display:flex;gap:5px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:var(--radius-md);border:0.5px solid var(--border);background:var(--bg);color:var(--text-secondary);font-size:13px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:5px}
.tab:hover{background:var(--bg-secondary)}
.tab.active{background:var(--accent-light);color:var(--accent);border-color:var(--accent-mid);font-weight:500}

/* ── 週スクロールカレンダー ── */
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.nav-btn{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-md);padding:5px 11px;cursor:pointer;color:var(--text-secondary);font-size:13px;transition:all 0.15s}
.nav-btn:hover{background:var(--bg-secondary);border-color:var(--border-hover)}
.week-range-label{font-size:13px;color:var(--text-secondary)}
.scroll-cal{display:flex;flex-direction:column;gap:6px}
.week-block{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.week-header{padding:7px 14px;background:var(--bg-secondary);border-bottom:0.5px solid var(--border);font-size:11px;font-weight:500;color:var(--text-secondary);letter-spacing:0.03em}
.day-row{display:grid;grid-template-columns:52px 1fr auto;align-items:stretch;border-bottom:0.5px solid var(--border);min-height:48px;transition:background 0.12s}
.day-row:last-child{border-bottom:none}
.day-row:hover{background:var(--bg-secondary)}
.day-row.today-row{background:var(--accent-light)}
.day-row.today-row:hover{background:#E2E0FC}
.day-cell{padding:10px 0 10px 14px;display:flex;flex-direction:column;justify-content:center;border-right:0.5px solid var(--border)}
.day-label{font-size:10px;color:var(--text-tertiary)}
.day-date{font-size:13px;font-weight:500;color:var(--text-primary)}
.day-row.today-row .day-date{color:var(--accent);font-weight:700}
.meal-cell{padding:9px 10px 9px 14px;display:flex;flex-direction:column;justify-content:center;gap:3px;cursor:pointer}
.meal-text{font-size:13px;color:var(--text-primary);line-height:1.4}
.meal-empty{font-size:12px;color:var(--text-tertiary)}
.meal-url{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--url-color);text-decoration:none;width:fit-content}
.meal-url:hover{text-decoration:underline}
.meal-url i{font-size:11px}
.edit-cell{display:flex;align-items:center;padding:0 10px 0 6px}
.edit-icon-btn{background:transparent;border:none;color:var(--text-tertiary);cursor:pointer;font-size:15px;padding:4px;border-radius:6px;transition:all 0.15s;display:flex;align-items:center}
.edit-icon-btn:hover{color:var(--accent);background:var(--accent-light)}

/* 編集パネル */
.edit-panel{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem}
.edit-panel-title{font-size:14px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.field-label{font-size:11px;color:var(--text-secondary);margin-bottom:5px;font-weight:500}
.field-group{margin-bottom:10px}
.form-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px}
input[type=text],input[type=url]{width:100%;padding:8px 12px;border:0.5px solid var(--border);border-radius:var(--radius-md);background:var(--bg);color:var(--text-primary);font-size:13px;font-family:inherit;outline:none;transition:border-color 0.15s}
input[type=text]:focus,input[type=url]:focus{border-color:var(--accent)}
.save-btn{padding:8px 18px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-md);font-size:13px;cursor:pointer;transition:all 0.15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.save-btn:hover{background:#3C3489}
.cancel-btn{padding:8px 13px;background:transparent;border:0.5px solid var(--border);border-radius:var(--radius-md);font-size:13px;cursor:pointer;color:var(--text-secondary);transition:all 0.15s}
.cancel-btn:hover{background:var(--bg-secondary)}
.del-btn{padding:8px 13px;background:transparent;border:0.5px solid #fca5a5;border-radius:var(--radius-md);font-size:13px;cursor:pointer;color:#E24B4A;transition:all 0.15s;margin-left:auto}
.del-btn:hover{background:#FEF2F2}

/* 検索・振り返り */
.panel{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem}
.panel-title{font-size:14px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.search-results{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.result-item{padding:10px 12px;background:var(--bg-secondary);border-radius:var(--radius-md)}
.result-meal{font-size:14px;color:var(--text-primary)}
.result-date{font-size:11px;color:var(--text-tertiary);margin-top:2px}
.result-url{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--url-color);text-decoration:none;margin-top:4px;width:fit-content}
.result-url:hover{text-decoration:underline}
.empty-msg{font-size:13px;color:var(--text-tertiary);text-align:center;padding:2rem 0}
.history-week-label{font-size:11px;font-weight:500;color:var(--text-secondary);margin:14px 0 7px;padding-bottom:5px;border-bottom:0.5px solid var(--border)}
.history-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--border);gap:8px}
.history-row:last-child{border-bottom:none}
.history-day{font-size:12px;color:var(--text-secondary);min-width:72px;padding-top:1px}
.history-content{flex:1;display:flex;flex-direction:column;gap:3px}
.history-meal{font-size:13px;color:var(--text-primary)}
.history-url{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--url-color);text-decoration:none;width:fit-content}
.history-url:hover{text-decoration:underline}
.delete-btn{background:transparent;border:none;color:var(--text-tertiary);cursor:pointer;font-size:14px;padding:2px 5px;flex-shrink:0;transition:color 0.15s}
.delete-btn:hover{color:#E24B4A}
.count-badge{font-size:11px;background:var(--bg-tertiary);color:var(--text-secondary);padding:2px 8px;border-radius:20px;margin-left:auto}

/* インポート */
textarea{width:100%;padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--radius-md);background:var(--bg);color:var(--text-primary);font-size:13px;font-family:inherit;resize:vertical;outline:none;line-height:1.7;transition:border-color 0.15s}
textarea:focus{border-color:var(--accent)}
.import-preview{margin-top:14px;display:flex;flex-direction:column;gap:4px}
.preview-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius-md);background:var(--bg-secondary);font-size:13px}
.preview-row.ok{border-left:2px solid #1D9E75}
.preview-row.warn{border-left:2px solid #BA7517}
.preview-date{color:var(--text-secondary);min-width:110px;font-size:12px}
.preview-meal{color:var(--text-primary);flex:1;font-size:12px}
.preview-badge{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap}
.badge-new{background:#E1F5EE;color:#0F6E56}
.badge-over{background:#FAEEDA;color:#854F0B}
.import-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.import-note{font-size:12px;color:var(--text-tertiary);margin-top:10px;line-height:1.7}
.import-week-label{font-size:11px;font-weight:500;color:var(--text-secondary);margin:10px 0 5px;padding-bottom:4px;border-bottom:0.5px solid var(--border)}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:9px 18px;border-radius:var(--radius-md);font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="container">
  <div class="app-header">
    <div class="app-title"><span>🍽️</span> 献立カレンダー</div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-calendar" onclick="showTab('calendar')"><i class="ti ti-calendar" style="font-size:13px"></i>カレンダー</button>
    <button class="tab" id="tab-search" onclick="showTab('search')"><i class="ti ti-search" style="font-size:13px"></i>検索</button>
    <button class="tab" id="tab-history" onclick="showTab('history')"><i class="ti ti-history" style="font-size:13px"></i>振り返り</button>
    <button class="tab" id="tab-import" onclick="showTab('import')"><i class="ti ti-file-import" style="font-size:13px"></i>インポート</button>
  </div>

  <!-- Calendar -->
  <div id="calendarView">
    <div class="week-nav">
      <button class="nav-btn" onclick="shiftWeeks(-4)"><i class="ti ti-chevrons-left"></i></button>
      <button class="nav-btn" onclick="shiftWeeks(-1)"><i class="ti ti-chevron-left"></i></button>
      <span class="week-range-label" id="weekRangeLabel"></span>
      <button class="nav-btn" onclick="shiftWeeks(1)"><i class="ti ti-chevron-right"></i></button>
      <button class="nav-btn" onclick="shiftWeeks(4)"><i class="ti ti-chevrons-right"></i></button>
      <button class="nav-btn" onclick="goToday()" title="今週に戻る"><i class="ti ti-home" style="font-size:13px"></i></button>
    </div>
    <div id="editPanelContainer"></div>
    <div class="scroll-cal" id="scrollCal"></div>
  </div>

  <!-- Search -->
  <div id="searchView" style="display:none">
    <div class="panel">
      <div class="panel-title"><i class="ti ti-search" style="color:var(--accent)"></i>料理名で検索</div>
      <input type="text" id="searchInput" placeholder="料理名を入力（例：チキン、パスタ…）" oninput="doSearch()" style="width:100%">
      <div class="search-results" id="searchResults">
        <div class="empty-msg">キーワードを入力すると過去の料理を探せます</div>
      </div>
    </div>
  </div>

  <!-- History -->
  <div id="historyView" style="display:none">
    <div class="panel">
      <div class="panel-title" style="justify-content:space-between">
        <span><i class="ti ti-history" style="color:var(--accent)"></i> 過去の献立</span>
        <span class="count-badge" id="totalCount"></span>
      </div>
      <div id="historyList"></div>
    </div>
  </div>

  <!-- Import -->
  <div id="importView" style="display:none">
    <div class="panel">
      <div class="panel-title"><i class="ti ti-file-import" style="color:var(--accent)"></i>メモから一括インポート</div>
      <textarea id="importText" rows="10" placeholder="iPhoneのメモをそのまま貼り付け&#10;&#10;・一番上が今週、下に行くほど古い週として自動で日付を割り当てます&#10;・週の区切りは2行以上の空行でOK&#10;&#10;例：&#10;月 グリーンカレー ゆで卵&#10;火 パスタ サラダ&#10;&#10;&#10;月 肉じゃが 味噌汁&#10;水 チャーハン" oninput="previewImport()"></textarea>
      <div class="import-note">・一番上の週＝今週として自動で日付を割り当て、下に行くほど1週ずつ遡ります<br>・複数のおかずはまとめて1行として保存されます<br>・記録のない曜日はスキップされます<br>・すでに登録済みの日は上書きになります（URLは保持されます）</div>
      <div class="import-preview" id="importPreview"></div>
      <div class="import-actions" id="importActions" style="display:none">
        <button class="save-btn" onclick="doImport()"><i class="ti ti-check" style="font-size:13px"></i> インポート実行</button>
        <button class="cancel-btn" onclick="clearImport()">クリア</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const DAYS=['月','火','水','木','金'];
const DAY_MAP={月:0,火:1,水:2,木:3,金:4};

// データ形式: { "2025-01-06": { meal:"カレー", url:"https://..." }, ... }
// 旧形式(文字列)も読み込み時に変換
function loadMeals(){
  try{
    const raw=JSON.parse(localStorage.getItem('kondate_v2')||'{}');
    return raw;
  }catch(e){return{}}
}
function migrateLegacy(){
  // kondate_v1 (文字列形式) を v2 (オブジェクト形式) に移行
  try{
    const old=localStorage.getItem('kondate_v1');
    if(!old)return;
    const v1=JSON.parse(old);
    const v2={};
    Object.entries(v1).forEach(([k,v])=>{
      if(typeof v==='string') v2[k]={meal:v,url:''};
      else v2[k]=v;
    });
    localStorage.setItem('kondate_v2',JSON.stringify(v2));
    localStorage.removeItem('kondate_v1');
  }catch(e){}
}

migrateLegacy();
let meals=loadMeals();
let weekOffset=0; // 0=今週中心, 表示は今週含む前後N週
let selectedDate=null;
const VISIBLE_WEEKS=4; // 表示する週数

function save(){try{localStorage.setItem('kondate_v2',JSON.stringify(meals))}catch(e){}}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function getMonday(d){
  const dt=new Date(d);
  const day=dt.getDay();
  dt.setDate(dt.getDate()+(day===0?-6:1-day));
  dt.setHours(0,0,0,0);
  return dt;
}
function dateKey(d){return d.toISOString().split('T')[0]}
function fmtShort(d){return (d.getMonth()+1)+'/'+d.getDate()}
function fmtFull(d){return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日('+DAYS[(d.getDay()+6)%7]+')'}
function getMealObj(key){
  const v=meals[key];
  if(!v)return{meal:'',url:''};
  if(typeof v==='string')return{meal:v,url:''};
  return{meal:v.meal||'',url:v.url||''};
}

function shiftWeeks(n){weekOffset+=n;renderCalendar()}
function goToday(){weekOffset=0;renderCalendar()}

function renderCalendar(){
  const today=new Date();
  const todayKey=dateKey(today);
  const thisMonday=getMonday(today);

  // 表示開始週: weekOffset週ずらした週を中心に前後
  const centerMonday=new Date(thisMonday);
  centerMonday.setDate(centerMonday.getDate()+weekOffset*7);
  // 表示: centerMondayを含む前後でVISIBLE_WEEKS週表示（新しい順）
  const startMonday=new Date(centerMonday);
  startMonday.setDate(startMonday.getDate()-(Math.floor(VISIBLE_WEEKS/2))*7);

  const endDate=new Date(startMonday);
  endDate.setDate(endDate.getDate()+VISIBLE_WEEKS*7-1);
  document.getElementById('weekRangeLabel').textContent=fmtShort(startMonday)+'〜'+fmtShort(endDate);

  const cal=document.getElementById('scrollCal');
  cal.innerHTML='';

  for(let w=VISIBLE_WEEKS-1;w>=0;w--){
    const mon=new Date(startMonday);
    mon.setDate(mon.getDate()+w*7);
    const sun=new Date(mon);sun.setDate(sun.getDate()+6);

    const block=document.createElement('div');
    block.className='week-block';

    const isThisWeek=dateKey(mon)===dateKey(thisMonday);
    block.innerHTML=`<div class="week-header">${fmtShort(mon)}（月）〜 ${fmtShort(new Date(mon.getTime()+4*86400000))}（金）${isThisWeek?' ★ 今週':''}</div>`;

    for(let d=0;d<5;d++){
      const day=new Date(mon);day.setDate(day.getDate()+d);
      const key=dateKey(day);
      const {meal,url}=getMealObj(key);
      const isToday=key===todayKey;
      const isSel=key===selectedDate;

      const row=document.createElement('div');
      row.className='day-row'+(isToday?' today-row':'');

      let mealHtml='';
      if(meal){
        mealHtml=`<div class="meal-text">${esc(meal)}</div>`;
        if(url) mealHtml+=`<a class="meal-url" href="${esc(url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><i class="ti ti-link"></i>${esc(trimUrl(url))}</a>`;
      }else{
        mealHtml=`<div class="meal-empty">タップして入力</div>`;
      }

      row.innerHTML=
        `<div class="day-cell"><div class="day-label">${DAYS[d]}</div><div class="day-date">${fmtShort(day)}</div></div>`+
        `<div class="meal-cell" onclick="openEdit('${key}')">${mealHtml}</div>`+
        `<div class="edit-cell"><button class="edit-icon-btn" onclick="openEdit('${key}')" title="編集"><i class="ti ${meal?'ti-edit':'ti-plus'}"></i></button></div>`;

      if(isSel) row.style.background='var(--accent-light)';
      block.appendChild(row);
    }
    cal.appendChild(block);
  }

  renderEditPanel();
}

function trimUrl(url){
  try{
    const u=new URL(url);
    let s=u.hostname+u.pathname;
    if(s.length>40)s=s.slice(0,38)+'…';
    return s;
  }catch(e){return url.length>40?url.slice(0,38)+'…':url}
}

function openEdit(key){
  selectedDate=key;
  renderEditPanel();
  const ep=document.getElementById('editPanelContainer');
  if(ep) ep.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderEditPanel(){
  const container=document.getElementById('editPanelContainer');
  if(!selectedDate){container.innerHTML='';return;}
  const d=new Date(selectedDate);
  const {meal,url}=getMealObj(selectedDate);
  container.innerHTML=
    `<div class="edit-panel">`+
    `<div class="edit-panel-title"><i class="ti ti-pencil" style="color:var(--accent)"></i>${fmtFull(d)} の夕食</div>`+
    `<div class="field-group"><div class="field-label">料理名</div><input type="text" id="mealInput" placeholder="料理名を入力…" value="${esc(meal)}" onkeydown="if(event.key==='Enter')document.getElementById('urlInput').focus()"></div>`+
    `<div class="field-group"><div class="field-label">参考レシピURL（任意）</div><input type="url" id="urlInput" placeholder="https://www.youtube.com/..." value="${esc(url)}" onkeydown="if(event.key==='Enter')saveMeal()"></div>`+
    `<div class="form-row"><button class="save-btn" onclick="saveMeal()"><i class="ti ti-check" style="font-size:13px"></i>保存</button><button class="cancel-btn" onclick="cancelEdit()">閉じる</button>${meal?`<button class="del-btn" onclick="deleteMeal('${selectedDate}')"><i class="ti ti-trash" style="font-size:13px"></i>削除</button>`:''}</div>`+
    `</div>`;
  setTimeout(()=>{const i=document.getElementById('mealInput');if(i){i.focus();if(meal){i.select()}}},30);
}

function saveMeal(){
  const mealVal=(document.getElementById('mealInput').value||'').trim();
  const urlVal=(document.getElementById('urlInput').value||'').trim();
  if(mealVal) meals[selectedDate]={meal:mealVal,url:urlVal};
  else delete meals[selectedDate];
  save();
  showToast(mealVal?'保存しました ✓':'削除しました');
  selectedDate=null;
  renderCalendar();
}

function deleteMeal(key){
  if(!confirm(fmtFull(new Date(key))+'の記録を削除しますか？'))return;
  delete meals[key];save();
  selectedDate=null;
  renderCalendar();
  showToast('削除しました');
}

function cancelEdit(){
  selectedDate=null;
  document.getElementById('editPanelContainer').innerHTML='';
  renderCalendar();
}

function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  const box=document.getElementById('searchResults');
  if(!q){box.innerHTML='<div class="empty-msg">キーワードを入力すると過去の料理を探せます</div>';return;}
  const results=Object.entries(meals)
    .filter(([k,v])=>{const m=typeof v==='string'?v:(v.meal||'');return m.includes(q)})
    .sort((a,b)=>b[0].localeCompare(a[0]));
  if(!results.length){box.innerHTML=`<div class="empty-msg">「${esc(q)}」の記録が見つかりません</div>`;return;}
  box.innerHTML=results.map(([k,v])=>{
    const {meal,url}=getMealObj(k);
    const d=new Date(k);
    const urlHtml=url?`<a class="result-url" href="${esc(url)}" target="_blank" rel="noopener"><i class="ti ti-link"></i>${esc(trimUrl(url))}</a>`:'';
    return `<div class="result-item"><div class="result-meal">${esc(meal)}</div><div class="result-date">${fmtFull(d)}</div>${urlHtml}</div>`;
  }).join('');
}

function renderHistory(){
  const list=document.getElementById('historyList');
  const keys=Object.keys(meals).filter(k=>getMealObj(k).meal).sort((a,b)=>b.localeCompare(a));
  document.getElementById('totalCount').textContent='合計 '+keys.length+' 件';
  if(!keys.length){list.innerHTML='<div class="empty-msg">まだ記録がありません</div>';return;}
  const byWeek={};
  keys.forEach(k=>{
    const wk=dateKey(getMonday(new Date(k)));
    if(!byWeek[wk])byWeek[wk]=[];
    byWeek[wk].push(k);
  });
  const weekKeys=Object.keys(byWeek).sort((a,b)=>b.localeCompare(a));
  list.innerHTML=weekKeys.map(wk=>{
    const wDate=new Date(wk);
    const wEnd=new Date(wk);wEnd.setDate(wEnd.getDate()+6);
    const rows=byWeek[wk].sort().map(k=>{
      const d=new Date(k);
      const {meal,url}=getMealObj(k);
      const urlHtml=url?`<a class="history-url" href="${esc(url)}" target="_blank" rel="noopener"><i class="ti ti-link"></i>${esc(trimUrl(url))}</a>`:'';
      return `<div class="history-row">`+
        `<span class="history-day">${DAYS[(d.getDay()+6)%7]} ${fmtShort(d)}</span>`+
        `<div class="history-content"><span class="history-meal">${esc(meal)}</span>${urlHtml}</div>`+
        `<button class="delete-btn" onclick="deleteMealHistory('${k}')" title="削除"><i class="ti ti-trash"></i></button>`+
        `</div>`;
    }).join('');
    return `<div><div class="history-week-label">${fmtShort(wDate)} 〜 ${fmtShort(wEnd)}</div>${rows}</div>`;
  }).join('');
}

function deleteMealHistory(key){
  if(!confirm(fmtFull(new Date(key))+'の記録を削除しますか？'))return;
  delete meals[key];save();renderHistory();showToast('削除しました');
}

// ── インポート ──
function splitWeeks(text){return text.split(/\n{2,}/).map(b=>b.trim()).filter(b=>b)}

function parseImportText(){
  const text=document.getElementById('importText').value;
  if(!text.trim())return[];
  const thisMonday=getMonday(new Date());
  const weekBlocks=splitWeeks(text);
  const results=[];
  weekBlocks.forEach((block,i)=>{
    const weekMonday=new Date(thisMonday);
    weekMonday.setDate(weekMonday.getDate()-i*7);
    block.split('\n').map(l=>l.trim()).filter(l=>l).forEach(line=>{
      const m=line.match(/^([月火水木金土日])\s+(.+)/);
      if(!m)return;
      const d=new Date(weekMonday);
      d.setDate(d.getDate()+DAY_MAP[m[1]]);
      const key=dateKey(d);
      const existing=getMealObj(key);
      results.push({key,weekIndex:i,meal:m[2].trim(),existingUrl:existing.url,exists:!!existing.meal});
    });
  });
  return results;
}

function previewImport(){
  const rows=parseImportText();
  const preview=document.getElementById('importPreview');
  const actions=document.getElementById('importActions');
  if(!rows.length){preview.innerHTML='';actions.style.display='none';return;}
  const byWeek={};
  rows.forEach(r=>{if(!byWeek[r.weekIndex])byWeek[r.weekIndex]=[];byWeek[r.weekIndex].push(r)});
  const weekCount=Object.keys(byWeek).length;
  let html=`<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px">${weekCount}週分・${rows.length}件を検出</div>`;
  Object.keys(byWeek).sort((a,b)=>a-b).forEach(wi=>{
    const wr=byWeek[wi];
    const mon=getMonday(new Date(wr[0].key));
    const end=new Date(mon);end.setDate(end.getDate()+6);
    const label=wi=='0'?'今週':wi=='1'?'先週':`${wi}週前`;
    html+=`<div class="import-week-label">${label}（${fmtShort(mon)}〜${fmtShort(end)}）</div>`;
    html+=wr.map(r=>{
      const d=new Date(r.key);
      const badge=r.exists?`<span class="preview-badge badge-over">上書き</span>`:`<span class="preview-badge badge-new">新規</span>`;
      return `<div class="preview-row ${r.exists?'warn':'ok'}"><span class="preview-date">${fmtFull(d)}</span><span class="preview-meal">${esc(r.meal)}</span>${badge}</div>`;
    }).join('');
  });
  preview.innerHTML=html;
  actions.style.display='flex';
}

function doImport(){
  const rows=parseImportText();
  if(!rows.length)return;
  rows.forEach(r=>{meals[r.key]={meal:r.meal,url:r.existingUrl||''};});
  save();
  showToast(rows.length+'件をインポートしました ✓');
  clearImport();
}

function clearImport(){
  document.getElementById('importText').value='';
  document.getElementById('importPreview').innerHTML='';
  document.getElementById('importActions').style.display='none';
}

function showTab(name){
  ['calendar','search','history','import'].forEach(t=>{
    document.getElementById(t+'View').style.display=t===name?'block':'none';
    document.getElementById('tab-'+t).classList.toggle('active',t===name);
  });
  if(name==='calendar')renderCalendar();
  if(name==='history')renderHistory();
  if(name==='search'){const i=document.getElementById('searchInput');i.value='';doSearch();setTimeout(()=>i.focus(),50);}
}

renderCalendar();
